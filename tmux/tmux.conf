##### PREFIX / KEYBINDINGS #####

# Make Ctrl + Space my Prefix (trigger) key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

##### CORE OPTIONS #####

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Ensure window index numbers get reordered on delete
set-option -g renumber-windows on

# Make it scrollable
setw -g mouse on

# Status bar at top
set -g status-position top

# Best default on modern tmux
set -g default-terminal "tmux-256color"

# Enable true colour
set -as terminal-overrides ",*:RGB"

##### PLUGINS #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

##### CATPPUCCIN: FIXES FOR YOUR ISSUES #####

# Stop programs (zsh/ssh/etc) from renaming tmux windows (window option, so use setw)
setw -g allow-rename off
setw -g automatic-rename off

# Rounded window tabs
# Catppuccin supports built-in window styles; "rounded" is one of them. :contentReference[oaicite:2]{index=2}
set -g @catppuccin_window_status_style "rounded"

# Window text: show window name, add a zoom marker if zoomed
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

# Number position and fill
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"

# Right side modules
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

# Separators
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

##### APPLY THE THEME RELIABLY #####

bind r source-file ~/.tmux.conf \; refresh-client -S \; display-message "tmux config reloaded"

##### TPM (keep this at the very bottom of tmux.conf) #####
run '~/.tmux/plugins/tpm/tpm'
